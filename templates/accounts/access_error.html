{% extends 'base.html' %}
{% block title %}Accès refusé{% endblock %}
{% block page_title %}Accès refusé{% endblock %}
{% block nav_dashboard %}active{% endblock %}

{% block content %}
<div class="text-center py-5">
  <div class="d-inline-block p-4 rounded-4" style="background:#f8fafc; border:1px solid #cbd5e1; max-width:560px; width:100%;">
    <div class="mb-3" style="font-size:3rem; color:#ef4444;"><i class="bi bi-x-circle-fill"></i></div>
    <h2 class="fw-bold mb-2" style="color:#0f172a;">{{ title }}</h2>
    <p class="text-muted mb-4" style="font-size:1rem; line-height:1.7;">{{ message }}</p>
    <a href="{% url 'dashboard' %}" class="btn btn-primary" style="background:#2563eb; border-color:#2563eb;">Retour au tableau de bord</a>
  </div>
</div>
{% endblock %}
